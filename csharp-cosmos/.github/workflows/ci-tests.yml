name: CI Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  unit-tests:
    name: Unit & component tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: csharp-cosmos/src/web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: csharp-cosmos/src/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm run test

  e2e-tests:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: csharp-cosmos/src/web/package-lock.json

      - name: Install and build web app
        working-directory: csharp-cosmos/src/web
        run: npm ci && npm run build

      - name: Install test dependencies and Playwright (Firefox)
        working-directory: csharp-cosmos/tests
        run: npm ci && npx playwright install --with-deps firefox

      - name: Start preview server and run Playwright
        working-directory: csharp-cosmos/tests
        run: |
          (cd ../src/web && npm run preview) &
          npx wait-on http://localhost:4173 --timeout 60000
          REACT_APP_WEB_BASE_URL=http://localhost:4173 npx playwright test --project=firefox
        env:
          CI: true
